<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Waku — Voice Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0a12;
    --surface:   #12121e;
    --glass:     rgba(255,255,255,0.04);
    --glass-b:   rgba(255,255,255,0.09);
    --accent1:   #7B6EF6;
    --accent2:   #4FC3F7;
    --accent3:   #A78BFA;
    --green:     #34D399;
    --text:      #E8E6FF;
    --muted:     #888AAA;
    --danger:    #F87171;
    --radius:    16px;
    --orb-size:  180px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    overflow-x: hidden;
    user-select: none;
  }

  /* ── Animated starfield bg ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 120% 60% at 20% 0%, rgba(123,110,246,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 80% 50% at 80% 100%, rgba(79,195,247,0.12) 0%, transparent 55%),
      radial-gradient(ellipse 60% 40% at 50% 50%, rgba(167,139,250,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .stars {
    position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
  }
  .star {
    position: absolute; border-radius: 50%;
    background: white; opacity: 0;
    animation: twinkle var(--d, 3s) var(--delay, 0s) infinite ease-in-out;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; transform: scale(0.5); }
    50%      { opacity: var(--op, 0.6); transform: scale(1); }
  }

  /* ── Layout ── */
  .app {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem 1rem 3rem;
    gap: 0;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .logo-row {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    margin-bottom: 0.5rem;
  }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 24px rgba(123,110,246,0.45);
  }
  .logo-text {
    font-family: 'Space Mono', monospace;
    font-size: 2rem; font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent1) 0%, var(--accent2) 60%, var(--accent3) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .tagline {
    font-size: 0.9rem; color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase;
  }

  /* ── Central Orb ── */
  .orb-wrapper {
    position: relative;
    width: var(--orb-size); height: var(--orb-size);
    margin-bottom: 2.5rem;
    cursor: pointer;
  }
  .orb-ring {
    position: absolute; inset: -20px;
    border-radius: 50%;
    border: 1.5px solid rgba(123,110,246,0.25);
    animation: spin 8s linear infinite;
  }
  .orb-ring::before {
    content: ''; position: absolute;
    top: -3px; left: 50%; transform: translateX(-50%);
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent1);
    box-shadow: 0 0 10px var(--accent1);
  }
  .orb-ring2 {
    position: absolute; inset: -38px;
    border-radius: 50%;
    border: 1px solid rgba(79,195,247,0.15);
    animation: spin 14s linear infinite reverse;
  }
  .orb-ring2::after {
    content: ''; position: absolute;
    bottom: -3px; right: 15%;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2);
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .orb {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #9D8FFF 0%, #5B4FCC 40%, #1a1540 100%);
    box-shadow:
      0 0 0 1px rgba(123,110,246,0.3),
      0 0 40px rgba(123,110,246,0.4),
      0 0 80px rgba(123,110,246,0.2),
      inset 0 0 40px rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s ease, box-shadow 0.3s ease;
  }
  .orb-wrapper:hover .orb {
    transform: scale(1.04);
    box-shadow:
      0 0 0 1px rgba(123,110,246,0.5),
      0 0 60px rgba(123,110,246,0.6),
      0 0 100px rgba(123,110,246,0.3),
      inset 0 0 40px rgba(0,0,0,0.5);
  }

  /* Listening state */
  .orb.listening {
    animation: pulse-orb 1.4s ease-in-out infinite;
    background: radial-gradient(circle at 35% 35%, #67E8F9 0%, #0891B2 40%, #0c2233 100%);
    box-shadow:
      0 0 0 1px rgba(79,195,247,0.6),
      0 0 60px rgba(79,195,247,0.6),
      0 0 100px rgba(79,195,247,0.3),
      inset 0 0 40px rgba(0,0,0,0.5);
  }
  @keyframes pulse-orb {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.06); }
  }

  /* Processing state */
  .orb.processing {
    animation: rotate-orb 2s linear infinite;
  }
  @keyframes rotate-orb {
    from { filter: hue-rotate(0deg); }
    to   { filter: hue-rotate(360deg); }
  }

  /* Waves inside orb */
  .orb-waves {
    display: flex; align-items: center; gap: 5px; height: 40px;
  }
  .wave-bar {
    width: 4px; border-radius: 4px;
    background: rgba(255,255,255,0.85);
    height: 10px;
    transition: height 0.1s ease;
  }
  .orb.idle    .wave-bar { animation: none; }
  .orb.listening .wave-bar {
    animation: wave-dance var(--wt, 0.6s) var(--wd, 0s) ease-in-out infinite alternate;
  }
  .orb.processing .wave-bar {
    animation: wave-proc 0.8s var(--wd, 0s) ease-in-out infinite alternate;
  }
  @keyframes wave-dance {
    from { height: 8px; }
    to   { height: 36px; }
  }
  @keyframes wave-proc {
    from { height: 6px; }
    to   { height: 28px; }
  }

  /* ── Status text ── */
  .status {
    font-size: 1rem; color: var(--muted);
    letter-spacing: 0.04em;
    margin-bottom: 2rem;
    min-height: 1.5rem;
    text-align: center;
    transition: color 0.3s;
  }
  .status.active { color: var(--accent2); }
  .status.speak  { color: var(--green); }

  /* ── Transcript bubble ── */
  .transcript-area {
    width: 100%; max-width: 480px;
    min-height: 60px;
    margin-bottom: 2rem;
  }
  .bubble {
    padding: 14px 20px;
    border-radius: var(--radius);
    font-size: 0.95rem;
    line-height: 1.5;
    animation: fadeUp 0.25s ease;
    display: none;
    backdrop-filter: blur(10px);
  }
  .bubble.show { display: block; }
  .bubble.user {
    background: rgba(123,110,246,0.15);
    border: 1px solid rgba(123,110,246,0.3);
    color: #C4BEFF;
    margin-bottom: 10px;
  }
  .bubble.user::before {
    content: '👤  '; font-size: 0.85em;
  }
  .bubble.assistant {
    background: rgba(79,195,247,0.1);
    border: 1px solid rgba(79,195,247,0.25);
    color: #BAE6FD;
  }
  .bubble.assistant::before {
    content: '🔊  '; font-size: 0.85em;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Controls ── */
  .controls {
    display: flex; gap: 14px; margin-bottom: 2.8rem; flex-wrap: wrap; justify-content: center;
  }
  .btn {
    display: flex; align-items: center; gap: 8px;
    padding: 11px 22px;
    border-radius: 50px;
    border: 1px solid var(--glass-b);
    background: var(--glass);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem; font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
    backdrop-filter: blur(12px);
  }
  .btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.18); }
  .btn:active { transform: scale(0.96); }
  .btn.primary {
    background: linear-gradient(135deg, var(--accent1), #5B4FCC);
    border-color: transparent;
    box-shadow: 0 0 20px rgba(123,110,246,0.35);
  }
  .btn.primary:hover {
    background: linear-gradient(135deg, #8B7EFF, #6B60DC);
    box-shadow: 0 0 30px rgba(123,110,246,0.5);
  }
  .btn.danger {
    border-color: rgba(248,113,113,0.4);
    color: var(--danger);
  }
  .btn.danger:hover { background: rgba(248,113,113,0.1); }

  /* ── Commands grid ── */
  .commands-section {
    width: 100%; max-width: 700px;
  }
  .commands-title {
    font-size: 0.75rem; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--muted);
    text-align: center; margin-bottom: 1.2rem;
  }
  .commands-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
    gap: 10px;
  }
  .cmd-card {
    background: var(--glass);
    border: 1px solid var(--glass-b);
    border-radius: 14px;
    padding: 14px 14px 12px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    backdrop-filter: blur(8px);
    display: flex; flex-direction: column; gap: 6px;
  }
  .cmd-card:hover {
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.16);
    transform: translateY(-2px);
  }
  .cmd-card:active { transform: scale(0.97); }
  .cmd-icon { font-size: 1.4rem; }
  .cmd-label {
    font-size: 0.82rem; font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }
  .cmd-hint {
    font-size: 0.73rem; color: var(--muted);
    font-style: italic;
  }

  /* ── Status bar ── */
  .status-bar {
    position: fixed; top: 18px; right: 22px;
    display: flex; align-items: center; gap: 8px;
    font-size: 0.78rem; color: var(--muted);
    background: var(--glass);
    border: 1px solid var(--glass-b);
    border-radius: 50px; padding: 6px 14px;
    backdrop-filter: blur(12px);
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.on  { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 1.2s infinite; }
  .status-dot.mic { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Footer ── */
  .footer {
    position: fixed; bottom: 14px; left: 0; right: 0;
    text-align: center;
    font-size: 0.73rem; color: rgba(136,138,170,0.5);
    pointer-events: none;
  }

  /* ── Wake-word badge ── */
  .wake-badge {
    position: fixed; top: 18px; left: 22px;
    display: flex; align-items: center; gap: 8px;
    font-size: 0.78rem; color: var(--muted);
    background: var(--glass);
    border: 1px solid var(--glass-b);
    border-radius: 50px; padding: 6px 14px;
    backdrop-filter: blur(12px);
  }
  .wake-pill {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    background: rgba(123,110,246,0.2);
    border: 1px solid rgba(123,110,246,0.4);
    color: var(--accent3);
    border-radius: 50px;
    padding: 1px 8px;
  }
</style>
</head>
<body>

<!-- Starfield -->
<div class="stars" id="stars"></div>

<!-- Status bar top right -->
<div class="status-bar">
  <div class="status-dot" id="dot"></div>

</div>

<!-- Wake word badge top left -->
<div class="wake-badge">
  <span>Say</span>
  <span class="wake-pill">Hey Waku</span>
</div>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo-row">
      <div class="logo-icon">🎙</div>
      <div class="logo-text">WAKU</div>
    </div>
    <div class="tagline">Personal Voice Assistant</div>
  </div>

  <!-- Central Orb -->
  <div class="orb-wrapper" id="orbWrapper" onclick="handleOrbClick()">

      <div class="orb-waves">
        <div class="wave-bar" style="--wt:0.5s;--wd:0.0s"></div>
        <div class="wave-bar" style="--wt:0.7s;--wd:0.1s"></div>
        <div class="wave-bar" style="--wt:0.4s;--wd:0.2s"></div>
        <div class="wave-bar" style="--wt:0.6s;--wd:0.05s"></div>
        <div class="wave-bar" style="--wt:0.55s;--wd:0.15s"></div>
        <div class="wave-bar" style="--wt:0.45s;--wd:0.25s"></div>

  </div>

  <!-- Status text -->

  <!-- Transcript bubbles -->

    </button>

      <span>🚀</span> Launch Waku (Python)
    </button>

  <!-- Commands grid -->
  <div class="commands-section">
    <div class="commands-title">Available Commands — click to try</div>
    <div class="commands-grid" id="cmdGrid"></div>
  </div>

</div>

<div class="footer">Waku Voice Assistant · Powered by speech recognition + intents.json</div>

<script>
// ─── Starfield ─────────────────────────────────────────────────────────────
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `
    left:${Math.random()*100}%;top:${Math.random()*100}%;
    width:${size}px;height:${size}px;
    --d:${(Math.random()*4+2).toFixed(1)}s;
    --delay:${(Math.random()*5).toFixed(1)}s;
    --op:${(Math.random()*0.5+0.3).toFixed(2)};
  `;
  starsEl.appendChild(s);
}

// ─── Commands data ──────────────────────────────────────────────────────────
const COMMANDS = [
  { icon:'⏰', label:'What time is it', hint:'Get current time' },
  { icon:'📅', label:'What date is it', hint:'Today\'s date' },
  { icon:'😄', label:'Tell me a joke',  hint:'Random joke' },
  { icon:'🌟', label:'Tell me a fact',  hint:'Fun fact' },
  { icon:'▶️', label:'Open YouTube',    hint:'Launch YouTube' },
  { icon:'🔍', label:'Open Google',     hint:'Launch Google' },
  { icon:'📧', label:'Open Gmail',      hint:'Check email' },
  { icon:'🗺️', label:'Open Maps',       hint:'Google Maps' },
  { icon:'🎵', label:'Open Spotify',    hint:'Play music' },
  { icon:'🎬', label:'Open Netflix',    hint:'Watch movies' },
  { icon:'🐙', label:'Open GitHub',     hint:'Code repos' },
  { icon:'📖', label:'Open Wikipedia',  hint:'Encyclopedia' },
  { icon:'🧮', label:'Open Calculator', hint:'Math help' },
  { icon:'📝', label:'Open Notepad',    hint:'Text editor' },
  { icon:'🔊', label:'Volume up',       hint:'Increase volume' },
  { icon:'🔇', label:'Mute',            hint:'Silence audio' },
  { icon:'📸', label:'Take a screenshot', hint:'Capture screen' },
  { icon:'🪙', label:'Flip a coin',     hint:'Heads or tails' },
  { icon:'🎲', label:'Roll a dice',     hint:'Random 1–6' },
  { icon:'💻', label:'System info',     hint:'CPU & RAM' },
  { icon:'❓', label:'What can you do', hint:'List all commands' },
  { icon:'👋', label:'Goodbye',         hint:'Exit assistant' },
];

const grid = document.getElementById('cmdGrid');
COMMANDS.forEach(c => {
  const card = document.createElement('div');
  card.className = 'cmd-card';
  card.innerHTML = `
    <div class="cmd-icon">${c.icon}</div>
    <div class="cmd-label">${c.label}</div>
    <div class="cmd-hint">${c.hint}</div>
  `;
  card.onclick = () => simulateCommand(c.label);
  grid.appendChild(card);
});

// ─── State ──────────────────────────────────────────────────────────────────
const orb         = document.getElementById('orb');
const statusEl    = document.getElementById('status');
const dot         = document.getElementById('dot');
const barLabel    = document.getElementById('bar-label');
const userBubble  = document.getElementById('userBubble');
const assistantBubble = document.getElementById('assistantBubble');

let recognition = null;
let isListening = false;
let speechSynth = window.speechSynthesis;

function setOrbState(state) {
  orb.className = 'orb ' + state;
}

function setStatus(text, type = '') {
  statusEl.textContent = text;
  statusEl.className = 'status ' + type;
}

function setBar(text, state) {
  barLabel.textContent = text;
  dot.className = 'status-dot ' + state;
}

function showBubble(el, text) {
  el.textContent = text;
  el.classList.add('show');
}

function hideBubble(el) { el.classList.remove('show'); }

// ─── Web Speech API ──────────────────────────────────────────────────────────
function initRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;
  const r = new SpeechRecognition();
  r.continuous = false;
  r.interimResults = true;
  r.lang = 'en-US';

  r.onstart = () => {
    isListening = true;
    setOrbState('listening');
    setStatus('Listening...', 'active');
    setBar('Listening', 'mic');
    hideBubble(userBubble);
    hideBubble(assistantBubble);
  };

  r.onresult = (e) => {
    const transcript = Array.from(e.results)
      .map(r => r[0].transcript).join('');
    showBubble(userBubble, transcript);
    if (e.results[e.results.length - 1].isFinal) {
      handleCommand(transcript.trim().toLowerCase());
    }
  };

  r.onerror = (e) => {
    stopListening();
    setStatus('Mic error: ' + e.error, '');
    setBar('Error', '');
  };

  r.onend = () => {
    isListening = false;
    if (orb.classList.contains('listening')) {
      setOrbState('idle');
      setStatus('Tap the orb or press Space to speak', '');
      setBar('Ready', 'on');
    }
  };

  return r;
}

function startListening() {
  if (isListening) return;
  if (!recognition) recognition = initRecognition();
  if (!recognition) {
    setStatus('⚠️  Web Speech not supported — use Chrome/Edge', '');
    return;
  }
  try { recognition.start(); } catch(e) {}
}

function stopListening() {
  if (recognition && isListening) {
    recognition.abort();
  }
  isListening = false;
  setOrbState('idle');
  setStatus('Tap the orb or press Space to speak', '');
  setBar('Ready', 'on');
}

function handleOrbClick() {
  if (isListening) stopListening();
  else startListening();
}

// ─── Keyboard shortcut ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.target.matches('input,textarea')) {
    e.preventDefault();
    if (isListening) stopListening();
    else startListening();
  }
  if (e.code === 'Escape') stopListening();
});

// ─── Intent matching (mirrors Python logic) ──────────────────────────────────
const INTENTS = {
  farewell:      ['quit','exit','bye','goodbye','stop','see you','later','shut down','close'],
  get_time:      ['time','what time'],
  get_date:      ['date','today'],
  open_youtube:  ['youtube'],
  open_google:   ['open google'],
  open_gmail:    ['gmail','email'],
  open_github:   ['github'],
  open_wikipedia:['wikipedia','wiki'],
  open_maps:     ['maps','navigate','directions'],
  open_spotify:  ['spotify'],
  open_netflix:  ['netflix'],
  search_google: ['search for','look up','google search','find information'],
  search_youtube:['search youtube','find on youtube','play on youtube'],
  tell_joke:     ['joke','funny','laugh','make me laugh'],
  tell_fact:     ['fact','did you know','random fact'],
  open_calculator:['calculator'],
  open_notepad:  ['notepad','notes','text editor'],
  volume_up:     ['volume up','louder','turn it up'],
  volume_down:   ['volume down','quieter','turn it down'],
  mute:          ['mute','silence'],
  flip_coin:     ['flip','coin','heads','tails'],
  roll_dice:     ['dice','die','roll'],
  screenshot:    ['screenshot','capture screen'],
  system_info:   ['system info','cpu','ram','battery','computer info'],
  greeting:      ['hello','hi','hey','good morning','good evening','howdy'],
  how_are_you:   ['how are you','you okay','how do you feel'],
  whats_your_name:['your name','who are you','introduce'],
  capabilities:  ['what can you do','help','commands','capabilities','features'],
};

const JOKES = [
  "Why don't scientists trust atoms? Because they make up everything!",
  "I told my computer I needed a break — now it won't stop sending me Kit-Kat ads.",
  "Why do programmers prefer dark mode? Because light attracts bugs!",
  "What do you call a fake noodle? An impasta!",
  "I'm reading a book about anti-gravity — it's impossible to put down!",
  "Why did the scarecrow win an award? Outstanding in his field!",
];
const FACTS = [
  "Honey never spoils — archaeologists found 3000-year-old honey in Egyptian tombs that was still edible!",
  "A day on Venus is longer than a year on Venus due to its extremely slow rotation.",
  "Octopuses have three hearts and blue blood!",
  "The Eiffel Tower can be 15 centimetres taller in summer due to thermal expansion.",
  "A group of flamingos is called a flamboyance!",
  "Bananas are berries, but strawberries are not!",
];

function matchIntent(text) {
  for (const [intent, keywords] of Object.entries(INTENTS)) {
    if (keywords.some(kw => text.includes(kw))) return intent;
  }
  return null;
}

function handleCommand(text) {
  const intent = matchIntent(text);
  setOrbState('processing');
  setStatus('Processing...', '');
  setBar('Thinking', '');

  setTimeout(() => {
    let response = '';

    switch (intent) {
      case 'farewell':
        response = 'Goodbye! Have a wonderful day!';
        break;
      case 'get_time':
        response = 'The current time is ' + new Date().toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'}) + '.';
        break;
      case 'get_date':
        response = 'Today is ' + new Date().toLocaleDateString('en-US', {weekday:'long',year:'numeric',month:'long',day:'numeric'}) + '.';
        break;
      case 'open_youtube':   openURL('https://youtube.com', 'YouTube'); return;
      case 'open_google':    openURL('https://google.com',  'Google');  return;
      case 'open_gmail':     openURL('https://mail.google.com', 'Gmail'); return;
      case 'open_github':    openURL('https://github.com',  'GitHub');  return;
      case 'open_wikipedia': openURL('https://wikipedia.org','Wikipedia'); return;
      case 'open_maps':      openURL('https://maps.google.com','Google Maps'); return;
      case 'open_spotify':   openURL('https://open.spotify.com','Spotify'); return;
      case 'open_netflix':   openURL('https://netflix.com', 'Netflix'); return;
      case 'search_google': {
        const q = text.replace(/search for|look up|google search|find information about|search/gi,'').trim();
        if (q) { openURL(`https://google.com/search?q=${encodeURIComponent(q)}`, 'Google Search for "'+q+'"'); return; }
        response = "What would you like me to search?";
        break;
      }
      case 'search_youtube': {
        const q = text.replace(/search youtube for|find on youtube|play on youtube|youtube search/gi,'').trim();
        if (q) { openURL(`https://youtube.com/results?search_query=${encodeURIComponent(q)}`, 'YouTube'); return; }
        response = "What should I search on YouTube?";
        break;
      }
      case 'tell_joke':    response = JOKES[Math.floor(Math.random()*JOKES.length)]; break;
      case 'tell_fact':    response = FACTS[Math.floor(Math.random()*FACTS.length)]; break;
      case 'flip_coin':    response = 'I flipped a coin... it\'s ' + (Math.random()<0.5?'Heads!':'Tails!'); break;
      case 'roll_dice':    response = 'I rolled a dice... you got ' + (Math.floor(Math.random()*6)+1) + '!'; break;
      case 'open_calculator': response = 'Opening calculator — use your system app for full functionality.'; break;
      case 'open_notepad':    response = 'Opening notes — use your system app for full functionality.'; break;
      case 'volume_up':    response = 'Volume control works through the Python app on your computer.'; break;
      case 'volume_down':  response = 'Volume control works through the Python app on your computer.'; break;
      case 'mute':         response = 'Mute works through the Python app on your computer.'; break;
      case 'screenshot':   response = 'Screenshot capture works through the Python app on your computer.'; break;
      case 'system_info':  response = 'System info is available through the Python app. Launch Waku to check CPU, RAM and battery.'; break;
      case 'greeting':     response = ['Hello! How can I help you today?', 'Hey there! Ready to assist!', 'Hi! What can I do for you?'][Math.floor(Math.random()*3)]; break;
      case 'how_are_you':  response = 'All systems running great! How can I help?'; break;
      case 'whats_your_name': response = "I'm Waku, your personal voice assistant!"; break;
      case 'capabilities': response = "I can tell the time, open websites, search Google or YouTube, tell jokes and facts, flip coins, roll dice, and much more! Just ask."; break;
      default:             response = "I'm not sure about that. Try saying 'what can you do' to see all commands.";
    }

    speak(response);
  }, 600);
}

function openURL(url, label) {
  const response = 'Opening ' + label + ' for you.';
  speak(response);
  setTimeout(() => window.open(url, '_blank'), 800);
}

function speak(text) {
  setOrbState('processing');
  showBubble(assistantBubble, text);
  setStatus('Speaking...', 'speak');
  setBar('Speaking', 'on');

  if (speechSynth) {
    speechSynth.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate = 1.0; utt.pitch = 1.05; utt.volume = 1;
    const voices = speechSynth.getVoices();
    const preferred = voices.find(v =>
      v.name.includes('Samantha') || v.name.includes('Karen') ||
      v.name.includes('Zira') || (v.lang.startsWith('en') && v.name.includes('Female'))
    );
    if (preferred) utt.voice = preferred;
    utt.onend = () => {
      setOrbState('idle');
      setStatus('Tap the orb or press Space to speak', '');
      setBar('Ready', 'on');
    };
    speechSynth.speak(utt);
  } else {
    setTimeout(() => {
      setOrbState('idle');
      setStatus('Tap the orb or press Space to speak', '');
      setBar('Ready', 'on');
    }, 2000);
  }
}

function simulateCommand(label) {
  showBubble(userBubble, label);
  handleCommand(label.toLowerCase());
}

// ─── Python launch instruction ────────────────────────────────────────────────
function launchPython() {
  const msg = document.createElement('div');
  msg.style.cssText = `
    position:fixed;inset:0;background:rgba(0,0,0,0.7);
    display:flex;align-items:center;justify-content:center;z-index:999;
    backdrop-filter:blur(8px);
  `;
  msg.innerHTML = `
    <div style="
      background:#12121e;border:1px solid rgba(123,110,246,0.4);
      border-radius:20px;padding:2rem 2.5rem;max-width:440px;width:90%;
      font-family:'Outfit',sans-serif;text-align:center;
      box-shadow:0 0 60px rgba(123,110,246,0.25);
    ">
      <div style="font-size:2rem;margin-bottom:1rem;">🚀</div>
      <div style="font-size:1.15rem;font-weight:600;color:#E8E6FF;margin-bottom:0.75rem;">Launch Waku Python App</div>
      <div style="font-size:0.85rem;color:#888AAA;margin-bottom:1.5rem;line-height:1.6;">
        Run this command in your terminal to start the full voice assistant:
      </div>
      <div style="
        background:#0a0a12;border:1px solid rgba(123,110,246,0.3);
        border-radius:10px;padding:12px 16px;
        font-family:'Space Mono',monospace;font-size:0.82rem;
        color:#A78BFA;text-align:left;margin-bottom:1.5rem;
        word-break:break-all;
      ">
        pip install speechrecognition pyttsx3<br/>
        python wake_assistant.py
      </div>
      <button onclick="this.closest('div[style]').remove()" style="
        background:linear-gradient(135deg,#7B6EF6,#5B4FCC);
        border:none;border-radius:50px;color:white;
        padding:10px 28px;font-family:'Outfit',sans-serif;
        font-size:0.9rem;cursor:pointer;
      ">Got it!</button>
    </div>
  `;
  document.body.appendChild(msg);
  msg.onclick = e => { if(e.target===msg) msg.remove(); };
}

// ─── Init ────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  setBar('Ready', 'on');
  recognition = initRecognition();
  if (!recognition) setStatus('⚠️ Use Chrome or Edge for voice recognition', '');

  // Load voices async
  speechSynth && speechSynth.addEventListener('voiceschanged', () => {});

  // Greeting on load
  setTimeout(() => {
    speak("Hello! I'm Waku, your personal voice assistant. Tap the orb or press Space to speak.");
  }, 800);
});
</script>
